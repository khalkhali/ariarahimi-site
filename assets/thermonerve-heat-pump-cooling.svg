<!--
  ThermoNerv embedded graphics export stub
  Variant: heat-pump-cooling
  Layer: full
  Source: npm run graphics:export
  Bench/field hardware validation: tracked separately
  Controller touchscreen dashboard export for TouchGFX and embedded UI handoff.
-->
<svg xmlns="http://www.w3.org/2000/svg" class="heat-pump-svg" data-touchgfx-map="heat-pump" data-render-strategy="cached-static-with-dynamic-overlays" data-static-layer="cached-vector-base" data-dynamic-layers="flow-overlay rotor-overlay status-overlay telemetry-overlay" data-overlay-budget="small-dynamic-overlays" data-symbol-manifest="machine-map-symbols-v1" viewBox="0 52 860 405" preserveAspectRatio="none" role="img" aria-label="Heat pump reversible cycle schematic">
      <style>
        .pipe,
        .coil-tube {
          fill: none;
          stroke-width: 12;
          stroke-linecap: round;
          stroke-linejoin: round;
        }
        .pipe.heat-discharge,
        .coil-tube.heat-discharge { stroke: #ff9e69; }
        .pipe.heat-liquid { stroke: #ffd36d; }
        .pipe.heat-suction,
        .coil-tube.heat-suction { stroke: #84c7ff; }
        .pipe-dash {
          fill: none;
          stroke-width: 5;
          stroke-linecap: round;
          stroke-dasharray: 14 10;
          stroke: #f1f5d1;
          animation: dashFlow 7s linear infinite;
        }
        .case-box,
        .reversing-valve,
        .valve-spool,
        .compressor-body,
        .compressor-head,
        .filter {
          fill: #0f1716;
          stroke: #385247;
          stroke-width: 3;
        }
        .outdoor-case,
        .indoor-case { fill: #11201d; }
        .reversing-valve { fill: #141d22; stroke: #516472; }
        .valve-spool { fill: #293946; stroke: #748697; }
        .compressor-body { fill: #121821; stroke: #4b5c70; }
        .compressor-head { fill: #1b2431; stroke: #627388; }
        .compressor-fin {
          stroke: #dfe8f2;
          stroke-width: 3;
          stroke-linecap: round;
        }
        .sight-glass {
          fill: rgba(120, 222, 194, 0.15);
          stroke: #8ff0d0;
          stroke-width: 4;
        }
        .cycle-label,
        .line-label,
        .heat-role-label {
          fill: #edf5ef;
          font-family: Arial, sans-serif;
          font-weight: 700;
          letter-spacing: 0.04em;
        }
        .cycle-label,
        .line-label { font-size: 17px; }
        .heat-role-label {
          font-size: 18px;
          fill: #9bf3d6;
        }
        .heat-mode-label {
          fill: #ffd699;
          font-size: 22px;
        }
        .fan-rotor {
          filter: drop-shadow(0 0 8px rgba(132, 241, 210, 0.18));
        }
        .fan-ring {
          fill: rgba(134, 252, 220, 0.08);
          stroke: #9cf0d5;
          stroke-width: 2.8;
        }
        .fan-blade {
          fill: rgba(134, 252, 220, 0.3);
          stroke: rgba(156, 240, 213, 0.4);
          stroke-width: 1.1;
          stroke-linejoin: round;
        }
        .fan-hub {
          fill: #e7fff7;
          stroke: #9cf0d5;
          stroke-width: 2;
        }
        .led {
          stroke: #ebf6f0;
          stroke-width: 1.5;
        }
        .led-on { fill: #90f3a8; filter: drop-shadow(0 0 6px rgba(144, 243, 168, 0.66)); }
        .led-off.red { fill: #351d1b; }
        .sensor-tag rect {
          fill: rgba(13, 20, 18, 0.92);
          stroke: #5b7d71;
          stroke-width: 2;
        }
        .sensor-tag text {
          fill: #eaf7ef;
          font-family: Arial, sans-serif;
          font-size: 15px;
          font-weight: 700;
          letter-spacing: 0.04em;
        }
        @keyframes dashFlow {
          from { stroke-dashoffset: 0; }
          to { stroke-dashoffset: -96; }
        }
        @keyframes rotorSpin {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
        }
      </style>
      <g data-render-layer="static-base" data-cache-policy="cache-on-profile-change">

