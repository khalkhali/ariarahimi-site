      <rect class="compressor-body" x="394" y="292" width="84" height="68" rx="10"></rect>
      <rect class="compressor-head" x="478" y="312" width="54" height="28" rx="8"></rect>
      <path class="compressor-fin" d="M412 302 V352 M428 302 V352 M444 302 V352"></path>
