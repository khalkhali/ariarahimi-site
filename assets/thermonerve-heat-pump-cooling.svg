      <circle class="sight-glass" cx="388" cy="405" r="15"></circle>
      <text class="cycle-label small-cycle-label" x="362" y="440">Sight</text>
      <rect class="filter" x="482" y="392" width="92" height="26" rx="13"></rect>
      <text class="cycle-label small-cycle-label" x="506" y="440">Filter</text>

      <text class="line-label small-line-label suction-label" x="304" y="284">Suction</text>
      <text class="line-label small-line-label discharge-label" x="514" y="268">Hot Gas</text>
      <text class="line-label small-line-label liquid-label" x="386" y="391">Liquid</text>

    
      </g>
