<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1900 1240" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1900" y2="1240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d120f"/>
      <stop offset="1" stop-color="#131a16"/>
    </linearGradient>
    <filter id="panelShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000" flood-opacity=".28"/>
    </filter>
    <filter id="labelShadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity=".3"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14L4 7Z" fill="#8dc3a5"/>
    </marker>
    <style>
      .title { font: 700 42px 'Segoe UI', Arial, sans-serif; fill: #f4f1ea; letter-spacing: .02em; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #b3b8af; }
      .label { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #f4f1ea; letter-spacing: .08em; text-transform: uppercase; }
      .body { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #cbd2ca; }
      .line { stroke: #8dc3a5; stroke-width: 3.5; stroke-linecap: round; marker-end: url(#arrow); }
      .dot { fill: #8dc3a5; }
    </style>
  </defs>

  <rect width="1900" height="1240" fill="url(#bg)"/>
  <g filter="url(#panelShadow)">
    <rect x="74" y="88" width="1752" height="1060" rx="36" fill="#121914"/>
  </g>

  <image href="main-board-render.svg?v=flat-black-3" x="250" y="185" width="1400" height="840" preserveAspectRatio="xMidYMid meet"/>

  <text x="126" y="170" class="title">Main Board</text>
  <text x="126" y="208" class="subtitle">Bottom field I/O and power board in the ThermoNerve controller stack.</text>

  <g filter="url(#labelShadow)">
    <circle cx="970" cy="326" r="7" class="dot"/>
    <path d="M236 302H512L970 326" class="line"/>
    <text x="126" y="288" class="label">Terminal Blocks</text>
    <text x="126" y="320" class="body">These are the field wiring terminals where real equipment signals land.</text>
    <text x="126" y="348" class="body">Technicians use these points to connect sensors, outputs, and control wiring.</text>
  </g>

  <g filter="url(#labelShadow)">
    <circle cx="1080" cy="794" r="7" class="dot"/>
    <path d="M238 948H474L1080 794" class="line"/>
    <text x="126" y="936" class="label">Relay Bank</text>
    <text x="126" y="968" class="body">This section switches equipment loads and controlled outputs.</text>
  </g>

  <g filter="url(#labelShadow)">
    <circle cx="606" cy="848" r="7" class="dot"/>
    <path d="M228 1080H404L606 848" class="line"/>
    <text x="126" y="1068" class="label">Capacitor Group</text>
    <text x="126" y="1100" class="body">These components help stabilize power and support the board's electrical behavior.</text>
  </g>

  <g filter="url(#labelShadow)">
    <circle cx="1180" cy="610" r="7" class="dot"/>
    <path d="M1542 434H1680V544L1180 610" class="line"/>
    <text x="1444" y="420" class="label">Power / Regulation Area</text>
    <text x="1444" y="452" class="body">This zone handles supply conditioning and board-level power management.</text>
  </g>

  <g filter="url(#labelShadow)">
    <circle cx="1520" cy="570" r="7" class="dot"/>
    <path d="M1580 274H1732V472L1520 570" class="line"/>
    <text x="1446" y="260" class="label">Connector / Interface Zone</text>
    <text x="1446" y="292" class="body">External interfaces and edge components used for system connectivity.</text>
  </g>

  <g filter="url(#labelShadow)">
    <circle cx="1210" cy="460" r="7" class="dot"/>
    <path d="M1468 1120H1734V980L1210 460" class="line"/>
    <text x="1446" y="1110" class="label">Field Signal Routing</text>
    <text x="1446" y="1142" class="body">The PCB routes tie the controller logic to wiring, switching, sensing, and power sections.</text>
  </g>

  <g opacity=".9">
    <rect x="126" y="1180" width="1220" height="32" rx="16" fill="rgba(141,195,165,0.08)"/>
    <text x="146" y="1202" class="body">Main board role: it is the physical equipment interface layer, where field wiring, power, switching, and output handling live.</text>
  </g>
</svg>
