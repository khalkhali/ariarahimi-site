      <rect class="safety-controller" x="292" y="82" width="276" height="88" rx="12"></rect>
      <text class="cycle-label small-cycle-label" x="386" y="116">Safety Ctrl</text>
      <text class="heat-role-label" x="380" y="144">Safety Lockout</text>

      
      <rect class="inducer-housing" x="642" y="82" width="92" height="64" rx="12"></rect>
      <text class="cycle-label tiny-cycle-label" x="660" y="76">Ind Fan</text>
      <text class="cycle-label tiny-cycle-label" x="178" y="88">Gas</text>


      <text class="line-label small-line-label suction-label" x="70" y="314">Return</text>
      <text class="line-label small-line-label liquid-label" x="666" y="314">Supply</text>
    
      </g>
