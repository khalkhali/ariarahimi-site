          <path class="fan-blade" transform="rotate(120)" d="M0 -16 C8 -16 13 -11 12 -4 C9 -4 5 -3 2 -1 C1 -5 -1 -10 0 -16 Z"></path>
          <path class="fan-blade" transform="rotate(240)" d="M0 -16 C8 -16 13 -11 12 -4 C9 -4 5 -3 2 -1 C1 -5 -1 -10 0 -16 Z"></path>
          <circle class="fan-hub" r="4.5"></circle>
        </g>
      </g>
      <g data-render-layer="rotor-overlay" data-symbol-id="fan-rotor" transform="translate(688 114) scale(0.91)">
        <g class="fan-rotor">
          <circle class="fan-ring" r="22"></circle>
          <path class="fan-blade" d="M0 -16 C8 -16 13 -11 12 -4 C9 -4 5 -3 2 -1 C1 -5 -1 -10 0 -16 Z"></path>
          <path class="fan-blade" transform="rotate(120)" d="M0 -16 C8 -16 13 -11 12 -4 C9 -4 5 -3 2 -1 C1 -5 -1 -10 0 -16 Z"></path>
          <path class="fan-blade" transform="rotate(240)" d="M0 -16 C8 -16 13 -11 12 -4 C9 -4 5 -3 2 -1 C1 -5 -1 -10 0 -16 Z"></path>
          <circle class="fan-hub" r="4.5"></circle>
        </g>
      </g>
      </g>
      <g data-render-layer="status-overlay" data-overlay-layer="status-overlay" data-overlay-policy="redraw-on-state-change">
      <circle data-render-layer="status-overlay" class="led led-on" cx="366" cy="276" r="5"></circle>
      <path data-render-layer="status-overlay" class="heat-exchanger active" d="M452 362 V334 L438 318 V282 L452 264 V238 M500 362 V334 L486 318 V282 L500 264 V238 M548 362 V334 L534 318 V282 L548 264 V238"></path>
      <g data-render-layer="status-overlay" class="burner-rack ">
