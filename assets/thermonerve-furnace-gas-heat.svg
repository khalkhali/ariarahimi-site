<!--
  ThermoNerv embedded graphics export stub
  Variant: furnace-gas-heat
  Layer: full
  Source: npm run graphics:export
  Bench/field hardware validation: tracked separately
  Controller touchscreen dashboard export for TouchGFX and embedded UI handoff.
-->
<svg xmlns="http://www.w3.org/2000/svg" class="furnace-svg" data-touchgfx-map="furnace" data-render-strategy="cached-static-with-dynamic-overlays" data-static-layer="cached-vector-base" data-dynamic-layers="flow-overlay rotor-overlay status-overlay telemetry-overlay" data-overlay-budget="small-dynamic-overlays" data-symbol-manifest="machine-map-symbols-v1" viewBox="0 0 860 455" role="img" aria-label="Gas Furnace furnace and air handler schematic">
      <style>
        .air-path,
        .combustion-path,
        .gas-line {
          fill: none;
          stroke-width: 12;
          stroke-linecap: round;
          stroke-linejoin: round;
        }
        .air-path.return-air { stroke: #90b8ff; }
        .air-path.supply-air,
        .air-path.heated-air { stroke: #ffb970; }
        .combustion-path { stroke: #ffd16f; stroke-width: 8; }
        .gas-line { stroke: #b0f0d7; stroke-width: 7; }
        .duct-section,
        .filter,
        .blower-housing,
        .heat-cabinet,
        .safety-controller,
        .gas-valve {
          fill: #111917;
          stroke: #3f584d;
          stroke-width: 3;
        }
        .return-duct,
        .supply-duct,
        .heat-cabinet { fill: #13211d; }
        .safety-controller { fill: #16221f; }
        .gas-valve { fill: #172321; stroke: #6f8f81; }
        .filter-lines,
        .heat-exchanger {
          fill: none;
          stroke: #dfe8dd;
          stroke-width: 4;
          stroke-linecap: round;
        }
        .heat-exchanger.active {
          stroke: #ffbe6a;
          filter: drop-shadow(0 0 10px rgba(255, 190, 106, 0.45));
        }
        .line-label,
        .cycle-label,
        .heat-role-label {
          fill: #eef5ef;
          font-family: Arial, sans-serif;
          font-weight: 700;
          letter-spacing: 0.04em;
        }
        .cycle-label.small-cycle-label { font-size: 18px; }
        .cycle-label.tiny-cycle-label,
        .line-label.small-line-label { font-size: 15px; }
        .line-label.heat-mode-label { font-size: 24px; fill: #ffd699; }
        .heat-role-label { font-size: 18px; fill: #99efd1; }
        .fan-rotor {
          filter: drop-shadow(0 0 8px rgba(132, 241, 210, 0.18));
        }
        .fan-ring {
          fill: rgba(137, 247, 220, 0.08);
          stroke: #a5f5db;
          stroke-width: 2.8;
        }
        .fan-blade {
          fill: rgba(137, 247, 220, 0.3);
          stroke: rgba(165, 245, 219, 0.42);
          stroke-width: 1.1;
          stroke-linejoin: round;
        }
        .fan-hub {
          fill: #e7fff7;
          stroke: #a5f5db;
          stroke-width: 2;
        }
        .burner-rack rect {
          fill: #191512;
          stroke: #b17a32;
          stroke-width: 2;
        }
        .flame {
          fill: rgba(255, 174, 89, 0.24);
          stroke: #ffc56d;
          stroke-width: 3;
          stroke-linejoin: round;
        }
        .led {
          stroke: rgba(255, 255, 255, 0.6);
          stroke-width: 2;
        }
        .led-on { fill: #89ffd8; filter: drop-shadow(0 0 7px rgba(137, 255, 216, 0.55)); }
        .led-off { fill: #39423e; }
        .led-on.red { fill: #ff6c6c; filter: drop-shadow(0 0 8px rgba(255, 108, 108, 0.5)); }
        .sensor-tag rect {
          fill: #111716;
          stroke: #546b60;
          stroke-width: 2;
        }
        .sensor-tag text {
          fill: #eef5ef;
          font-family: Arial, sans-serif;
          font-size: 14px;
          font-weight: 700;
          letter-spacing: 0.04em;
        }
        .temp-tag rect { stroke: #7cd7b3; }
        .suction-tag rect { stroke: #8fb6ff; }
        .discharge-tag rect { stroke: #ffb879; }
      </style>
      <g data-render-layer="static-base" data-cache-policy="cache-on-profile-change">

