              <g class="fan-rotor"><circle class="fan-ring" r="22"></circle><path class="fan-blade" d="M0 -16 C8 -16 13 -11 12 -4 C9 -4 5 -3 2 -1 C1 -5 -1 -10 0 -16 Z"></path><path class="fan-blade" transform="rotate(120)" d="M0 -16 C8 -16 13 -11 12 -4 C9 -4 5 -3 2 -1 C1 -5 -1 -10 0 -16 Z"></path><path class="fan-blade" transform="rotate(240)" d="M0 -16 C8 -16 13 -11 12 -4 C9 -4 5 -3 2 -1 C1 -5 -1 -10 0 -16 Z"></path><circle class="fan-hub" r="4.5"></circle></g>
            </g>
            <g data-render-layer="rotor-overlay" data-symbol-id="fan-rotor" transform="translate(400 77) scale(0.78)">
              <g class="fan-rotor"><circle class="fan-ring" r="22"></circle><path class="fan-blade" d="M0 -16 C8 -16 13 -11 12 -4 C9 -4 5 -3 2 -1 C1 -5 -1 -10 0 -16 Z"></path><path class="fan-blade" transform="rotate(120)" d="M0 -16 C8 -16 13 -11 12 -4 C9 -4 5 -3 2 -1 C1 -5 -1 -10 0 -16 Z"></path><path class="fan-blade" transform="rotate(240)" d="M0 -16 C8 -16 13 -11 12 -4 C9 -4 5 -3 2 -1 C1 -5 -1 -10 0 -16 Z"></path><circle class="fan-hub" r="4.5"></circle></g>
            </g>
            <g data-render-layer="rotor-overlay" data-symbol-id="fan-rotor" transform="translate(605 280) scale(0.91)">
              <g class="fan-rotor"><circle class="fan-ring" r="22"></circle><path class="fan-blade" d="M0 -16 C8 -16 13 -11 12 -4 C9 -4 5 -3 2 -1 C1 -5 -1 -10 0 -16 Z"></path><path class="fan-blade" transform="rotate(120)" d="M0 -16 C8 -16 13 -11 12 -4 C9 -4 5 -3 2 -1 C1 -5 -1 -10 0 -16 Z"></path><path class="fan-blade" transform="rotate(240)" d="M0 -16 C8 -16 13 -11 12 -4 C9 -4 5 -3 2 -1 C1 -5 -1 -10 0 -16 Z"></path><circle class="fan-hub" r="4.5"></circle></g>
            </g>
