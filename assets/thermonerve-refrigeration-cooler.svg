<!--
  ThermoNerv embedded graphics export stub
  Variant: refrigeration-cooler
  Layer: full
  Source: npm run graphics:export
  Bench/field hardware validation: tracked separately
  Controller touchscreen dashboard export for TouchGFX and embedded UI handoff.
-->
<svg xmlns="http://www.w3.org/2000/svg" data-touchgfx-map="refrigeration" data-render-strategy="cached-static-with-dynamic-overlays" data-static-layer="cached-vector-base" data-dynamic-layers="flow-overlay rotor-overlay status-overlay telemetry-overlay" data-overlay-budget="small-dynamic-overlays" data-symbol-manifest="machine-map-symbols-v1" viewBox="0 0 860 455" role="img" aria-label="Cooler refrigeration cycle schematic">
      <style>
        .pipe {
          fill: none;
          stroke: #6ec4aa;
          stroke-width: 12;
          stroke-linecap: round;
          stroke-linejoin: round;
        }
        .pipe.suction { stroke: #90b8ff; }
        .pipe.discharge { stroke: #ff9d63; }
        .pipe.liquid { stroke: #ffd36d; }
        .pipe-dash {
          fill: none;
          stroke-width: 5;
          stroke-linecap: round;
          stroke-dasharray: 14 10;
          animation: dashFlow 7s linear infinite;
        }
        .suction-dash { stroke: #d6e5ff; }
        .discharge-dash { stroke: #ffd7bd; }
        .liquid-dash { stroke: #fff0b8; }
        .case-box,
        .component,
        .accumulator,
        .oil-separator,
        .compressor-body,
        .compressor-head,
        .evap-box,
        .receiver,
        .small-part,
        .filter {
          fill: #0f1716;
          stroke: #385247;
          stroke-width: 3;
        }
        .evap-box { fill: #122321; stroke: #4b7668; }
        .component.condenser { fill: #101d1a; }
        .component.receiver,
        .receiver,
        .liquid-fill {
          fill: #c79a3e;
        }
        .accumulator,
        .suction-fill { fill: #3e6f9f; }
        .compressor-body { fill: #11171f; stroke: #4c5d73; }
        .compressor-head { fill: #1a2430; stroke: #5f7188; }
        .compressor-fin,
        .valve {
          fill: none;
          stroke: #d6e0ee;
          stroke-width: 3;
          stroke-linecap: round;
        }
        .cycle-label,
        .line-label,
        .big-temp {
          fill: #eef5ef;
          font-family: Arial, sans-serif;
          font-weight: 700;
          letter-spacing: 0.04em;
        }
        .cycle-label,
        .line-label { font-size: 18px; }
        .big-temp {
          font-size: 30px;
          fill: #8ff7d0;
        }
        .line-label { opacity: 0.82; }
        .defrost-heater.active {
          fill: #ffb253;
          filter: drop-shadow(0 0 8px rgba(255, 178, 83, 0.58));
        }
        .heater-coil.active {
          stroke: #ffd6a3;
          stroke-width: 5;
          fill: none;
          stroke-linecap: round;
          stroke-linejoin: round;
        }
        .fan-rotor {
          filter: drop-shadow(0 0 8px rgba(132, 241, 210, 0.18));
        }
        .fan-ring {
          fill: rgba(134, 252, 220, 0.08);
          stroke: #9cf0d5;
          stroke-width: 2.8;
        }
        .fan-blade {
          fill: rgba(134, 252, 220, 0.3);
          stroke: rgba(156, 240, 213, 0.4);
          stroke-width: 1.1;
          stroke-linejoin: round;
        }
        .fan-hub {
          fill: #e7fff7;
          stroke: #9cf0d5;
          stroke-width: 2;
        }
        .led {
          stroke: #ebf6f0;
          stroke-width: 1.5;
        }
        .led-on { fill: #90f3a8; filter: drop-shadow(0 0 6px rgba(144, 243, 168, 0.66)); }
        .led-on.red { fill: #ff8f7d; filter: drop-shadow(0 0 6px rgba(255, 143, 125, 0.66)); }
        .led-off { fill: #1c2b28; }
        .sensor-tag rect {
          fill: rgba(13, 20, 18, 0.92);
          stroke: #5b7d71;
          stroke-width: 2;
        }
        .sensor-tag text {
          fill: #eaf7ef;
          font-family: Arial, sans-serif;
          font-size: 15px;
          font-weight: 700;
          letter-spacing: 0.04em;
        }
        @keyframes dashFlow {
          from { stroke-dashoffset: 0; }
          to { stroke-dashoffset: -96; }
        }
        @keyframes rotorSpin {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
        }
      </style>
