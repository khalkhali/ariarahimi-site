<!--
  ThermoNerv embedded graphics export stub
  Variant: straight-cool-cooling
  Layer: full
  Source: npm run graphics:export
  Bench/field hardware validation: tracked separately
  Controller touchscreen dashboard export for TouchGFX and embedded UI handoff.
-->
<svg xmlns="http://www.w3.org/2000/svg" class="straight-cool-svg" data-touchgfx-map="straight-cool" data-render-strategy="cached-static-with-dynamic-overlays" data-static-layer="cached-vector-base" data-dynamic-layers="flow-overlay rotor-overlay status-overlay telemetry-overlay" data-overlay-budget="small-dynamic-overlays" data-symbol-manifest="machine-map-symbols-v1" viewBox="0 52 860 405" preserveAspectRatio="none" role="img" aria-label="Straight-cool HVAC cooling schematic with shared air handler">
      <style>
        .pipe,
        .coil-tube {
          fill: none;
          stroke-width: 12;
          stroke-linecap: round;
          stroke-linejoin: round;
        }
        .pipe.discharge,
        .coil-tube.discharge { stroke: #ff9e69; }
        .pipe.liquid { stroke: #ffd36d; }
        .pipe.suction,
        .coil-tube.suction { stroke: #84c7ff; }
        .pipe-dash {
          fill: none;
          stroke-width: 5;
          stroke-linecap: round;
          stroke-dasharray: 14 10;
          stroke: #f2f5d1;
        }
        .case-box,
        .compressor-body,
        .compressor-head,
        .filter,
        .small-part,
        .blower-housing {
          fill: #0f1716;
          stroke: #385247;
          stroke-width: 3;
        }
        .outdoor-case,
        .indoor-case { fill: #11201d; }
        .compressor-body { fill: #121821; stroke: #4b5c70; }
        .compressor-head { fill: #1b2431; stroke: #627388; }
        .compressor-fin,
        .valve {
          fill: none;
          stroke: #dfe8f2;
          stroke-width: 3;
          stroke-linecap: round;
        }
        .line-label,
        .cycle-label {
          fill: #edf5ef;
          font-family: Arial, sans-serif;
          font-weight: 700;
          letter-spacing: 0.04em;
        }
        .line-label.heat-mode-label { font-size: 24px; fill: #ffd699; }
        .cycle-label.heat-equipment-title { font-size: 18px; }
        .cycle-label.tiny-cycle-label,
        .line-label.small-line-label { font-size: 15px; }
        .fan-rotor {
          filter: drop-shadow(0 0 8px rgba(132, 241, 210, 0.18));
        }
        .fan-ring {
          fill: rgba(134, 252, 220, 0.08);
          stroke: #9cf0d5;
          stroke-width: 2.8;
        }
        .fan-blade {
          fill: rgba(134, 252, 220, 0.3);
          stroke: rgba(156, 240, 213, 0.4);
          stroke-width: 1.1;
          stroke-linejoin: round;
        }
        .fan-hub {
          fill: #e7fff7;
          stroke: #9cf0d5;
          stroke-width: 2;
        }
        .led {
          stroke: rgba(255, 255, 255, 0.6);
          stroke-width: 2;
        }
        .led-on { fill: #89ffd8; filter: drop-shadow(0 0 7px rgba(137, 255, 216, 0.55)); }
        .sensor-tag rect {
