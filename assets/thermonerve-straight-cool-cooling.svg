          stroke: #536a60;
          stroke-width: 2;
        }
        .sensor-tag text {
          fill: #eef5ef;
          font-family: Arial, sans-serif;
          font-size: 14px;
          font-weight: 700;
          letter-spacing: 0.04em;
        }
        .temp-tag rect { stroke: #78e0ba; }
        .suction-tag rect { stroke: #90b8ff; }
        .discharge-tag rect { stroke: #ffbb84; }
        .liquid-tag rect { stroke: #ffd98a; }
